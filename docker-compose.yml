services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-production}
      APP__DATABASE__HOST: db
      APP__DATABASE__PORT: 5432
      APP__DATABASE__USERNAME: ${POSTGRES_USER:?set POSTGRES_USER}
      APP__DATABASE__PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      APP__DATABASE__DATABASE_NAME: ${POSTGRES_DB:-kristofersxyz}
      APP__DATABASE__REQUIRE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kristofersxyz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
