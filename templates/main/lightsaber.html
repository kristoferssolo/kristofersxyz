{% load static%}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Lightsaber</title>
	<link rel="preconnect" href="https://fonts.gstatic.com" />
	<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@900&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css" />
	<link rel="stylesheet" href="{% static 'main/css/lightsaber.css' %}" />
</head>

<body>
	<label for="green">Green Lightsaber</label>
	<input type="radio" id="green" name="color" checked />

	<label for="blue">Blue Lightsaber</label>
	<input type="radio" id="blue" name="color" />

	<label for="yellow">Yellow Lightsaber</label>
	<input type="radio" id="yellow" name="color" />

	<label for="purple">Purple Lightsaber</label>
	<input type="radio" id="purple" name="color" />

	<label for="red">Red Lightsaber</label>
	<input type="radio" id="red" name="color" />

	<label for="darksaber">Darksaber</label>
	<input type="radio" id="darksaber" name="color" />

	<div class="lightsaber">
		<input type="checkbox" id="on-off" />
		<div class="blade"></div>
		<label class="hilt" for="on-off"> </label>
		<embed src="https://assets.codepen.io/308367/coolsaber.mp3" type="" />
	</div>
</body>

</html>
